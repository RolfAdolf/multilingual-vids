# Dev overlay (CPU, bind mounts, hot reload).
# Usage: docker compose -f docker-compose.yaml -f docker-compose.dev.yaml up --build
name: multilingual-vids

services:
  postgres:
    ports:
      - "5432:5432"

  rabbitmq:
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    ports:
      - "6379:6379"

  core-api:
    build:
      context: .
      dockerfile: core-api/Dockerfile
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DEBUG: "true"
    volumes:
      - ./core-api/src:/app/src

  worker-seamless:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: seamless
        INSTALL_DEV: "true"
    environment:
      CELERY_QUEUE: seamless
      SEAMLESS_DEVICE: cpu
      CELERY_DEV_RELOAD: "1"
      CELERY_CONCURRENCY: "1"
    entrypoint: ["/app/worker/scripts/entrypoint-celery-dev.sh"]
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src

  worker-zeroswot:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: zeroswot
        INSTALL_DEV: "true"
    environment:
      CELERY_QUEUE: zeroswot
      CELERY_DEV_RELOAD: "1"
      CELERY_CONCURRENCY: "1"
    entrypoint: ["/app/worker/scripts/entrypoint-celery-dev.sh"]
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src

  worker-zeroshot:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: zeroshot
        INSTALL_DEV: "true"
    environment:
      CELERY_QUEUE: zeroshot
      ZEROSHOT_MT_S3_PREFIX: ""
      ZEROSHOT_WHISPER_DEVICE: cpu
      ZEROSHOT_WHISPER_COMPUTE_TYPE: int8
      ZEROSHOT_WHISPER_MODEL: base
      CELERY_DEV_RELOAD: "1"
      CELERY_CONCURRENCY: "1"
    entrypoint: ["/app/worker/scripts/entrypoint-celery-dev.sh"]
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src
      - ../diploma/bachelor/graduate-project:/models/graduate-project:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: multilingual-vids-frontend-dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_PROXY_API: http://core-api:8000
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"

  nginx:
    volumes:
      - ./infra/nginx/dev-hot.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  frontend_node_modules:
