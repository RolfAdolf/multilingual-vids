services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: mv
      POSTGRES_PASSWORD: mv
      POSTGRES_DB: multilingual_videos
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mv -d multilingual_videos"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  core-api:
    build:
      context: .
      dockerfile: core-api/Dockerfile
    env_file:
      - .envs/.db
      - .envs/.core-api
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    working_dir: /app/src
    volumes:
      - ./core-api/src:/app/src

  worker-api:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .envs/.s3
      - .envs/.worker-api
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      core-api:
        condition: service_started
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src

  worker-seamless:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: seamless
    entrypoint: ["/app/worker/scripts/entrypoint-celery.sh"]
    env_file:
      - .envs/.s3
      - .envs/.worker-seamless
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      worker-api:
        condition: service_started
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src

  worker-zeroswot:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: zeroswot
    entrypoint: ["/app/worker/scripts/entrypoint-celery.sh"]
    env_file:
      - .envs/.s3
      - .envs/.worker-zeroswot
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      worker-api:
        condition: service_started
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src

  worker-zeroshot:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        POETRY_GROUP: zeroshot
    entrypoint: ["/app/worker/scripts/entrypoint-celery.sh"]
    env_file:
      - .envs/.s3
      - .envs/.worker-zeroshot
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      worker-api:
        condition: service_started
    volumes:
      - ./core-api/src:/app/core-api/src
      - ./worker/src:/app/worker/src
      - ../diploma/bachelor/graduate-project:/models/graduate-project:ro

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    depends_on:
      - core-api
      - worker-api

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - core-api
      - worker-api
      - frontend

  flower:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file:
      - .envs/.broker
      - .envs/.worker-api
    entrypoint: []
    command: ["celery", "-A", "config", "flower", "--port=5555"]
    working_dir: /app/worker/src
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
      - worker-api
    profiles:
      - ops

volumes:
  pg_data:
