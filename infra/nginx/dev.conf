upstream core_api_svc {
    server core-api:8000;
}

upstream worker_api_svc {
    server worker-api:8000;
}

upstream frontend_svc {
    server frontend:80;
}

server {
    listen 80;
    client_max_body_size 520M;

    location /api/v1/languages {
        proxy_pass http://core_api_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/models {
        proxy_pass http://core_api_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/v1/videos {
        proxy_pass http://worker_api_svc;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/schema/ {
        proxy_pass http://core_api_svc;
        proxy_set_header Host $host;
    }

    location /api/docs/ {
        proxy_pass http://core_api_svc;
        proxy_set_header Host $host;
    }

    location /admin/ {
        proxy_pass http://core_api_svc;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://core_api_svc;
    }

    location /ready {
        proxy_pass http://core_api_svc;
    }

    location / {
        proxy_pass http://frontend_svc;
        proxy_set_header Host $host;
    }
}
