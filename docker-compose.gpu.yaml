# GPU overlay for production (requires NVIDIA Container Toolkit on host).
# Usage: docker compose -f docker-compose.yaml -f docker-compose.gpu.yaml up -d --build
name: multilingual-vids

services:
  worker-seamless:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker-zeroswot:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  worker-zeroshot:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
